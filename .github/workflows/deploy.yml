name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: Sync to S3
        run: |
          # Sync all site files with 1h cache
          aws s3 sync . s3://cudas.party \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --delete \
            --cache-control "public, max-age=3600"

          # Re-upload HTML with short cache so updates propagate fast
          aws s3 cp index.html s3://cudas.party/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=60"

          aws s3 cp map.html s3://cudas.party/map.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=60"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2R4LQ97TSGAXQ \
            --paths "/*"
